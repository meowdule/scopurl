name: Deploy SiteScope to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "requests/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sitescope-pages-deploy
  cancel-in-progress: true

env:
  NEXT_PUBLIC_GITHUB_REPO: ${{ vars.NEXT_PUBLIC_GITHUB_REPO || github.repository }}
  NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || format('/{0}', github.event.repository.name) }}
  # Fine-grained PAT with repo scope (or classic PAT) — triggers repository_dispatch only.
  # Not GH_PAT; never entered by users in the UI.
  NEXT_PUBLIC_QUEUE_DISPATCH_TOKEN: ${{ secrets.QUEUE_DISPATCH_TOKEN }}
  # FormSubmit — first submission sends activation mail to the inbox.
  NEXT_PUBLIC_LEAD_WEBHOOK: ${{ vars.NEXT_PUBLIC_LEAD_WEBHOOK || 'https://formsubmit.co/ajax/tbell.wr@gmail.com' }}
  # Optional: Make.com / n8n webhook → Notion DB (see docs/DEPLOY.md)
  NEXT_PUBLIC_LEAD_NOTION_WEBHOOK: ${{ vars.NEXT_PUBLIC_LEAD_NOTION_WEBHOOK }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify QUEUE_DISPATCH_TOKEN secret
        run: |
          if [[ -z "${{ secrets.QUEUE_DISPATCH_TOKEN }}" ]]; then
            echo "::error::QUEUE_DISPATCH_TOKEN secret is required. Users must never see a GitHub Issue fallback — configure the secret before deploying Pages."
            exit 1
          fi

      - name: Build static site
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
