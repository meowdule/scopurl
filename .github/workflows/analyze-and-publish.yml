name: SiteScope analyze and publish

on:
  push:
    branches: [main]
    paths:
      - "requests/**"
  workflow_dispatch:
    inputs:
      request_file:
        description: "Request file path (for example requests/your-id.json)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sitescope-pages
  cancel-in-progress: false

env:
  NEXT_PUBLIC_GITHUB_REPO: ${{ vars.NEXT_PUBLIC_GITHUB_REPO || github.repository }}
  NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || format('/{0}', github.event.repository.name) }}
  NEXT_PUBLIC_QUEUE_DISPATCH_TOKEN: ${{ secrets.QUEUE_DISPATCH_TOKEN }}
  SITE_SCOPE_FAST: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve request files
        id: req
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "files=${{ github.event.inputs.request_file }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            FILES="$(git show --pretty="" --name-only "${{ github.sha }}" | grep '^requests/.*\.json$' || true)"
          else
            FILES="$(git diff --name-only --diff-filter=A "$BEFORE" "${{ github.sha }}" | grep '^requests/.*\.json$' || true)"
          fi
          LINE="$(echo "$FILES" | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          echo "files=$LINE" >> "$GITHUB_OUTPUT"

      - name: Run queued analyses
        shell: bash
        run: |
          set -euo pipefail
          FILES="${{ steps.req.outputs.files }}"
          if [[ -z "${FILES// }" ]]; then
            echo "No new request files in this push."
            exit 0
          fi
          for f in $FILES; do
            [[ -f "$f" ]] || continue
            echo "Running analysis for $f"
            node scripts/run-analysis.mjs --request-file="$f"
          done

      - name: Build static site
        run: npm run build

      - name: Commit report artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/reports public/cards
          if git diff --staged --quiet; then
            echo "No report artifact changes to commit."
          else
            git commit -m "chore: add SiteScope report artifacts"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
