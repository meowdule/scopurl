name: SiteScope retention cleanup

on:
  schedule:
    # Daily 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List deletions only (no commit)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sitescope-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run retention cleanup
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            npm run cleanup:reports -- --dry-run
          else
            npm run cleanup:reports
          fi

      - name: Commit cleanup changes
        if: inputs.dry_run != true
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/reports public/cards
          if git diff --staged --quiet; then
            echo "No expired artifacts to remove."
          else
            git commit -m "chore: remove expired SiteScope reports and cards (30d retention)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
